<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Deep learning inside machine learning</title>
  <desc id="desc">A mint deep-learning circle nested inside machine learning and artificial intelligence.</desc>
  <rect width="1600" height="900" fill="#fffdf5"/>
  <circle cx="800" cy="450" r="350" fill="#6656d9" stroke="#172033" stroke-width="16"/>
  <circle cx="800" cy="470" r="250" fill="#f4dc67" stroke="#172033" stroke-width="14"/>
  <circle cx="800" cy="490" r="155" fill="#8ff4d8" stroke="#172033" stroke-width="12"/>
  <text x="800" y="165" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" letter-spacing="2">ARTIFICIAL INTELLIGENCE</text>
  <text x="800" y="285" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="900" letter-spacing="2">MACHINE LEARNING</text>
  <text x="800" y="475" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" letter-spacing="2">DEEP</text>
  <text x="800" y="520" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" letter-spacing="2">LEARNING</text>
  <text x="800" y="570" text-anchor="middle" fill="#174b45" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="800">learns layered representations</text>
</svg>
