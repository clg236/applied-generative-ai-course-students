<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Machine learning inside artificial intelligence</title>
  <desc id="desc">A mustard machine-learning circle nested inside a larger violet artificial-intelligence circle.</desc>
  <rect width="1600" height="900" fill="#fffdf5"/>
  <circle cx="800" cy="450" r="350" fill="#6656d9" stroke="#172033" stroke-width="16"/>
  <circle cx="800" cy="470" r="250" fill="#f4dc67" stroke="#172033" stroke-width="14"/>
  <text x="800" y="165" text-anchor="middle" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" letter-spacing="2">ARTIFICIAL INTELLIGENCE</text>
  <text x="800" y="440" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="900" letter-spacing="2">MACHINE</text>
  <text x="800" y="500" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="900" letter-spacing="2">LEARNING</text>
  <text x="800" y="565" text-anchor="middle" fill="#433b20" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800">fits behavior from examples</text>
</svg>
