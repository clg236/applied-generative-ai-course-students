name: Student contribution policy

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate public student work
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out trusted policy from main
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Validate paths, size, symlinks, and credentials without executing submitted code
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/validate-student-pr.mjs
